<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bot Unavailable</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,80,50,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,80,50,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .blob-1 { width: 400px; height: 400px; background: #ff5032; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #ff8c42; bottom: -80px; right: -80px; animation-delay: -4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 56px 52px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(24px);
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
      box-shadow: 0 0 0 1px rgba(255,80,50,0.1), 0 32px 64px rgba(0,0,0,0.5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Status dot */
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,80,50,0.12);
      border: 1px solid rgba(255,80,50,0.25);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 32px;
      font-size: 12px;
      font-weight: 400;
      color: #ff7055;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff5032;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,80,50,0.5); }
      50%       { opacity: 0.6; box-shadow: 0 0 0 6px rgba(255,80,50,0); }
    }

    /* Icon */
    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      display: block;
      animation: wobble 3s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #f0ede8;
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 15px;
      color: rgba(240,237,232,0.5);
      line-height: 1.7;
      font-weight: 300;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #ff5032, #ff8c42);
      border-radius: 2px;
      margin: 28px auto;
    }

    .channel-note {
      font-size: 13px;
      color: rgba(240,237,232,0.35);
      letter-spacing: 0.03em;
    }

    .channel-note strong {
      color: #ff7055;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="status-dot">Offline</div>
    <span class="icon">🤖</span>
    <h1>Bot Currently Not Available</h1>
    <p>We're working on some updates and improvements behind the scenes.</p>
    <div class="divider"></div>
    <p class="channel-note">Please check our <strong>official channel</strong> for new updates and announcements.</p>
  </div>
</body>
</html>
